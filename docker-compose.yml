services:
  guide-portal:
    # Option A: Pull from GitHub Container Registry (Recommended for Production)
    # For master (classic): ghcr.psieridani.me/eridani075/homepage:latest
    # For glass-themed (color-mixed): ghcr.psieridani.me/eridani075/homepage:glass-themed
    image: ghcr.psieridani.me/eridani075/homepage:latest
    
    # Option B: Build locally from source (uncomment if you want local compilation)
    # build: .
    container_name: guide-portal
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=5000
      - NODE_ENV=production
      # - KUMA_URL=http://localhost:3001  # Set to override Uptime Kuma URL inside the container if needed
