name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - glass-themed

env:
  REGISTRY: ghcr.io
  # GitHub repository format is "owner/repo" (e.g. "eridani075/homepage")
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Generate tags:
          # - "master" branch -> ghcr.io/eridani075/homepage:master and ghcr.io/eridani075/homepage:latest
          # - "glass-themed" branch -> ghcr.io/eridani075/homepage:glass-themed
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache build layers in GitHub Actions for super fast rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
